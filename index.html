<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Video Extraction Tool | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg: #02040a;
            --surface: #0d1117;
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            /* ကြည်လင်ပြတ်သားသော Terminal Grid Background */
            background-image: 
                linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            background-size: 45px 45px;
            font-family: 'Inter', sans-serif;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .terminal-window {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 25px 70px -15px rgba(0, 0, 0, 0.9);
            width: 100%;
            /* အကျယ်အဝန်းကို ပိုချဲ့ထားပါသည် */
            max-width: 1000px; 
            position: relative;
            transition: all 0.3s ease;
        }

        .window-header {
            background: #161b22;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tab-btn {
            padding: 18px 24px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #8b949e;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: rgba(16, 185, 129, 0.05);
        }

        .quality-btn {
            border: 1px solid #30363d;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #0d1117;
            color: #8b949e;
        }

        .quality-btn.active {
            background: var(--primary);
            color: #0d1117;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .input-terminal {
            background: #010409;
            border: 1px solid #30363d;
            color: var(--primary);
            outline: none;
            transition: 0.3s;
        }

        .input-terminal:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .log-item {
            background: #010409;
            border: 1px solid #21262d;
            padding: 16px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-credit {
            color: rgba(201, 209, 217, 0.4);
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .footer-credit:hover { color: var(--primary); }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        /* Progress Bar */
        .progress-container {
            height: 4px;
            background: #21262d;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 12px var(--primary);
        }
    </style>
</head>
<body>

    <div class="terminal-window">
        <!-- Window Title Bar -->
        <div class="window-header">
            <div class="flex space-x-2">
                <div class="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
                <div class="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>
                <div class="w-3 h-3 rounded-full bg-[#27c93f]"></div>
            </div>
            <div class="flex items-center space-x-3">
                <!-- Terminal Icon -->
                <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <span class="text-[10px] mono text-slate-500 font-bold uppercase tracking-widest">GATEWAY — node-v1.0.1</span>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <nav class="flex border-b border-[#30363d] bg-[#161b22]/50">
            <button onclick="switchTab('single')" id="nav-single" class="tab-btn active flex-1">Single Stream</button>
            <button onclick="switchTab('batch')" id="nav-batch" class="tab-btn flex-1">Batch Job</button>
            <button onclick="switchTab('history')" id="nav-history" class="tab-btn flex-1">Log History</button>
        </nav>

        <div class="p-8 md:p-14 space-y-12">
            
            <!-- Quality Parameters (Only visible in Single/Batch) -->
            <div id="quality-panel" class="space-y-5 animate-in fade-in duration-300">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.25em]">Retrieval Parameters</p>
                <div class="flex flex-wrap gap-3">
                    <button class="quality-btn" onclick="updateRes('4K')">2160p 4K</button>
                    <button class="quality-btn" onclick="updateRes('2K')">1440p 2K</button>
                    <button class="quality-btn active" onclick="updateRes('1080p')">1080p FHD</button>
                    <button class="quality-btn" onclick="updateRes('720p')">720p HD</button>
                </div>
            </div>

            <!-- Single View -->
            <div id="view-single" class="space-y-8 animate-in slide-in-from-bottom-2">
                <div class="space-y-4">
                    <div class="flex items-center space-x-2 text-[11px] mono text-emerald-500 font-bold">
                        <span>$</span>
                        <span>exec --source-url</span>
                    </div>
                    <div class="flex flex-col lg:flex-row gap-4">
                        <input type="text" id="urlSingle" placeholder="Enter target stream link..." 
                               class="input-terminal flex-1 px-6 py-5 rounded-xl text-sm font-medium">
                        <button onclick="runTask('single')" class="bg-emerald-500 hover:bg-emerald-400 text-black font-extrabold px-12 py-5 rounded-xl text-xs uppercase tracking-widest transition-all shadow-xl active:scale-95">Extract</button>
                    </div>
                </div>
            </div>

            <!-- Batch View -->
            <div id="view-batch" class="hidden space-y-8 animate-in slide-in-from-bottom-2">
                <div class="space-y-4">
                    <div class="flex items-center space-x-2 text-[11px] mono text-blue-400 font-bold">
                        <span>$</span>
                        <span>batch --multi-input</span>
                    </div>
                    <textarea id="urlBatch" rows="6" placeholder="https://domain.com/video1&#10;https://domain.com/video2" 
                              class="input-terminal w-full px-6 py-5 rounded-xl text-sm font-medium resize-none"></textarea>
                    <button onclick="runTask('batch')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-extrabold py-5 rounded-xl text-xs uppercase tracking-widest transition-all">Run Batch Job</button>
                </div>
            </div>

            <!-- Log History View -->
            <div id="view-history" class="hidden space-y-6 animate-in fade-in">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Global Activity Logs</h3>
                    <button onclick="purgeLogs()" class="text-[10px] text-red-500 font-bold uppercase hover:underline">Purge All Logs</button>
                </div>
                <div id="logContainer" class="max-h-[400px] overflow-y-auto pr-4 custom-scroll space-y-4">
                    <!-- History entries here -->
                </div>
            </div>

            <!-- Processing Dashboard -->
            <div id="statusPanel" class="hidden space-y-10 pt-10 border-t border-[#30363d] animate-in fade-in">
                <div class="flex justify-between items-end">
                    <div class="space-y-2">
                        <p id="mainStatus" class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Handshaking</p>
                        <p id="subStatus" class="text-[9px] text-slate-500 mono uppercase">Bypass_Security_Gateway...</p>
                    </div>
                    <span id="pctLabel" class="text-2xl font-bold text-white mono">0%</span>
                </div>
                <div class="progress-container">
                    <div id="progressBar" class="progress-fill"></div>
                </div>

                <!-- Ready State Asset -->
                <div id="assetCard" class="hidden bg-emerald-500/5 border border-emerald-500/20 p-8 rounded-2xl flex flex-col lg:flex-row items-center justify-between gap-10">
                    <div class="flex items-center space-x-6 w-full lg:w-auto">
                        <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        </div>
                        <div class="min-w-0">
                            <p id="assetName" class="text-base font-bold text-white truncate max-w-[300px]">STREAM_CAPTURE.mp4</p>
                            <p id="assetMeta" class="text-[10px] text-slate-500 uppercase mt-2 font-semibold">Resolution: 1080p • Status: SHA256_Verified</p>
                        </div>
                    </div>
                    <div class="flex gap-4 w-full lg:w-auto">
                        <button onclick="commitDownload()" class="flex-1 lg:flex-none bg-white text-black font-extrabold px-14 py-4 rounded-xl text-[11px] uppercase tracking-widest hover:bg-emerald-500 hover:text-white transition-all shadow-xl active:scale-95">Save File</button>
                        <button onclick="resetSystem()" class="flex-1 lg:flex-none border border-[#30363d] text-slate-500 px-8 py-4 rounded-xl text-[11px] font-bold hover:text-white transition-all">New Task</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Co-created Credit Section (More Visible) -->
        <div class="bg-black/50 py-12 text-center border-t border-[#30363d]">
            <span class="footer-credit">Co-created by Nio and Gemini</span>
        </div>
    </div>

    <script>
        let currentRes = '1080p';
        let activityLogs = JSON.parse(localStorage.getItem('extractor_v4_logs')) || [];

        window.onload = () => { renderLogs(); };

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');
            
            ['single', 'batch', 'history'].forEach(v => {
                document.getElementById(`view-${v}`).classList.toggle('hidden', v !== tab);
            });

            // Hide/Show Resolution panel
            document.getElementById('quality-panel').classList.toggle('hidden', tab === 'history');
            
            if (tab === 'history') renderLogs();
        }

        function updateRes(r) {
            currentRes = r;
            document.querySelectorAll('.quality-btn').forEach(c => {
                c.classList.toggle('active', c.innerText.includes(r));
            });
        }

        async function runTask(mode) {
            const input = mode === 'single' ? document.getElementById('urlSingle').value : document.getElementById('urlBatch').value;
            if (!input.trim()) return;

            const panel = document.getElementById('statusPanel');
            const card = document.getElementById('assetCard');
            panel.classList.remove('hidden');
            card.classList.add('hidden');

            const workflow = [
                { t: "Establishing", d: "ENCRYPTED_TUNNEL_ESTABLISHED", p: 25 },
                { t: "Extracting", d: "PARSING_REMOTE_MANIFEST", p: 70 },
                { t: "Finalizing", d: "BUFFER_SYNC_VERIFIED", p: 100 }
            ];

            for (const step of workflow) {
                document.getElementById('mainStatus').innerText = step.t;
                document.getElementById('subStatus').innerText = step.d;
                await animateProgressBar(step.p);
            }

            document.getElementById('assetCard').classList.remove('hidden');
            const id = Math.random().toString(36).substring(7).toUpperCase();
            const name = mode === 'single' ? `STREAM_${id}.mp4` : `BATCH_JOB_${id}.zip`;
            document.getElementById('assetName').innerText = name;
            document.getElementById('assetMeta').innerText = `Resolution: ${currentRes} • Status: SHA256_Verified`;
        }

        function animateProgressBar(target) {
            return new Promise(resolve => {
                const bar = document.getElementById('progressBar');
                const pct = document.getElementById('pctLabel');
                const start = parseFloat(bar.style.width) || 0;
                const duration = 1200;
                const startTime = performance.now();

                function frame(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const val = start + (target - start) * progress;
                    bar.style.width = val + '%';
                    pct.innerText = Math.round(val) + '%';
                    if (progress < 1) requestAnimationFrame(frame);
                    else resolve();
                }
                requestAnimationFrame(frame);
            });
        }

        function commitDownload() {
            const name = document.getElementById('assetName').innerText;
            const link = "https://www.w3schools.com/html/mov_bbb.mp4"; 
            
            const a = document.createElement('a');
            a.href = link;
            a.setAttribute('download', name);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Log activity
            const newLog = {
                id: Date.now(),
                name: name,
                quality: currentRes,
                time: new Date().toLocaleString('en-US', { hour12: true, month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            };
            activityLogs.unshift(newLog);
            localStorage.setItem('extractor_v4_logs', JSON.stringify(activityLogs.slice(0, 100)));
            
            document.getElementById('mainStatus').innerText = "Process Complete";
            document.getElementById('subStatus').innerText = "WRITTEN_TO_STORAGE_SUCCESS";
        }

        function renderLogs() {
            const container = document.getElementById('logContainer');
            if (activityLogs.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-20 mono text-[11px] uppercase tracking-[0.4em]">Zero_Records_Found</div>';
                return;
            }
            container.innerHTML = activityLogs.map(log => `
                <div class="log-item">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-xs font-bold text-emerald-400 truncate pr-5">${log.name}</p>
                        <span class="text-[9px] font-bold px-2 py-0.5 bg-emerald-500/10 text-emerald-500 rounded border border-emerald-500/20">SUCCESS</span>
                    </div>
                    <div class="flex justify-between text-[10px] text-slate-500 mono uppercase">
                        <span>${log.time}</span>
                        <span>Level: ${log.quality}</span>
                    </div>
                </div>
            `).join('');
        }

        function resetSystem() {
            document.getElementById('statusPanel').classList.add('hidden');
            document.getElementById('urlSingle').value = '';
            document.getElementById('urlBatch').value = '';
        }

        function purgeLogs() {
            if (confirm("Permanently erase system extraction logs?")) {
                activityLogs = [];
                localStorage.removeItem('extractor_v4_logs');
                renderLogs();
            }
        }
    </script>
</body>
</html>
